name: flutter_game
description: "MBTI 히어로: 직장인 생존기 - 2D Top-down Wave Survival Game"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: ^1.35.0
  flame_audio: ^2.10.6
  shared_preferences: ^2.5.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/characters/
    - assets/images/enemies/
    - assets/images/effects/
    - assets/images/effects/extracted/
    - assets/images/maps/
    - assets/images/maps/obstacles/
    - assets/images/ui/
    - assets/images/ui/extracted/
    - assets/audio/
