<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_game">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_game</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #1a1a1a; /* 어두운 배경으로 몰입감 증가 */
    }
    
    /* 화면 위/아래에 고정되는 광고 배너 영역 */
    .ad-banner {
      position: absolute;
      left: 0;
      width: 100%;
      min-height: 50px;
      background-color: #000;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: sans-serif;
      font-size: 14px;
    }
    .ad-top { top: 0; }
    .ad-bottom { bottom: 0; }

    /* 추후 애드센스 스크립트를 넣기 위한 위치 설명 */
  </style>

  <!-- [추후 추가] 구글 애드센스 로드 스크립트를 이 곳에 넣습니다. -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXX" crossorigin="anonymous"></script> -->
</head>
<body>
  <!-- 상단 광고 배너 Placeholder -->
  <!-- 구글 애드센스 <ins> 태그를 여기에 배치하세요 -->
  <div class="ad-banner ad-top" id="ad-top">
    상단 광고 (AdSense) 노출 영역
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <!-- 하단 광고 배너 Placeholder -->
  <!-- 구글 애드센스 <ins> 태그를 여기에 배치하세요 -->
  <div class="ad-banner ad-bottom" id="ad-bottom">
    하단 광고 (AdSense) 노출 영역
  </div>
</body>
</html>
