  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="MBTI 히어로">
  <meta property="og:title" content="MBTI 히어로: 직장인 생존기">

  <meta property="og:url" content="https://mbti-hero.web.app/">

  <meta property="og:image:secure_url" content="https://mbti-hero.web.app/og-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MBTI 히어로: 직장인 생존기">
  <meta name="twitter:description" content="직장에서 살아남는 2D 생존 액션 게임">
  <meta name="twitter:image" content="https://mbti-hero.web.app/og-image.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MBTI 히어로">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MBTI 히어로: 직장인 생존기</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    :root {
      --game-max-width: 675px;
      --ad-banner-height: 50px;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #1a1a1a;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
    }

    /* Flutter web host: keep the game inside the same centered frame on every route. */
    #app-shell {
      position: fixed;
      top: 0;
      right: 0;
      bottom: var(--ad-banner-height);
      left: 0;
      display: flex;
      justify-content: center;
      align-items: stretch;
      width: 100%;
      height: calc(100dvh - var(--ad-banner-height));
      min-height: 0;
      overflow: hidden;
      background-color: #1a1a1a;
    }

    #flutter-host {
      position: relative;
      width: min(100vw, var(--game-max-width));
      max-width: var(--game-max-width);
      height: 100%;
      min-height: 0;
      overflow: hidden;
      contain: strict;
      touch-action: none;
      background-color: #000;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }

    #flutter-host flutter-view,
    #flutter-host flt-glass-pane {
      width: 100% !important;
      height: 100% !important;
      overflow: hidden !important;
    }

    /* 하단 광고 배너 영역 */
    .ad-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50px;
      min-height: 50px;
      background-color: #000;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: sans-serif;
      font-size: 14px;
    }
  </style>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8672292149752659"
     crossorigin="anonymous"></script>
</head>
<body>
  <main id="app-shell">
    <div id="flutter-host"></div>
  </main>

  <script src="flutter_bootstrap.js" async></script>

  <!-- 하단 광고 배너 Placeholder -->
  <!-- 구글 애드센스 <ins> 태그를 여기에 배치하세요 -->
  <div class="ad-banner ad-bottom" id="ad-bottom">
    하단 광고 (AdSense) 노출 영역
  </div>
</body>
</html>
